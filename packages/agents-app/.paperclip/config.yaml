# Paperclip Configuration
# Generated by org-os-agents setup

database:
  type: embedded
  path: ./.paperclip/db
  migrations: true

server:
  port: 3100
  host: 0.0.0.0
  environment: development

organization:
  autoDiscovery: true
  sourceFile: federation.yaml

sync:
  egregore:
    enabled: true
    interval: 300000  # 5 minutes
  orgOs:
    enabled: true
    interval: 600000  # 10 minutes

security:
  requireApproval:
    externalMessages: true
    financialActions: true
    agentHiring: true
    budgetChanges: true
