name: OPAL Bridge CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/opal-bridge/**'
      - '.github/workflows/opal-bridge.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/opal-bridge/**'
  release:
    types: [created]

env:
  NODE_VERSION: '20'
  PACKAGE_PATH: 'packages/opal-bridge'

jobs:
  # ─────────────────────────────────────────
  # Build and Unit Tests
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PACKAGE_PATH }}/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Compile TypeScript
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --coverage --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ${{ env.PACKAGE_PATH }}/coverage/lcov.info
          flags: opal-bridge
          name: opal-bridge-coverage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opal-bridge-dist
          path: ${{ env.PACKAGE_PATH }}/dist
          retention-days: 30

  # ─────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PACKAGE_PATH }}/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────
  # OPAL Integration Tests (with real OPAL)
  # ─────────────────────────────────────────
  opal-integration:
    name: OPAL Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OPAL repository
        uses: actions/checkout@v4
        with:
          repository: luizfernandosg/opal
          path: opal
          token: ${{ secrets.OPAL_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PACKAGE_PATH }}/package.json

      - name: Install OPAL Bridge dependencies
        run: npm ci

      - name: Build OPAL Bridge
        run: npm run build

      - name: Setup test OPAL instance
        run: |
          # Create minimal OPAL structure for testing
          mkdir -p opal-test/{_inbox,_staging,_approved,_rejected,handoffs}
          echo '# OPAL Test Instance' > opal-test/CLAUDE.md
          echo '{"version": "1.0.0-test"}' > opal-test/opal.json

      - name: Create test configuration
        run: |
          cat > federation.test.yaml << 'EOF'
          knowledge-commons:
            enabled: true
            opal-bridge:
              enabled: true
              opal_path: "../../opal-test"
              profile: "test"
              auto_process: false
              review_required: true
          EOF

      - name: Run OPAL integration tests
        run: npm run test:opal-integration
        env:
          NODE_ENV: test
          OPAL_TEST_PATH: ${{ github.workspace }}/opal-test

      - name: Cleanup test files
        if: always()
        run: rm -rf opal-test federation.test.yaml

  # ─────────────────────────────────────────
  # Package Release
  # ─────────────────────────────────────────
  package-release:
    name: Package & Release
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.event_name == 'release'
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create package tarball
        run: |
          npm pack
          mv *.tgz opal-bridge-${{ github.event.release.tag_name }}.tgz

      - name: Upload package to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ env.PACKAGE_PATH }}/opal-bridge-${{ github.event.release.tag_name }}.tgz
          asset_name: opal-bridge-${{ github.event.release.tag_name }}.tgz
          asset_content_type: application/gzip

      - name: Publish to npm (if not beta)
        if: ${{ !contains(github.event.release.tag_name, 'beta') && !contains(github.event.release.tag_name, 'alpha') && !contains(github.event.release.tag_name, 'rc') }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────
  # Deploy to Hub (regen-coordination-os)
  # ─────────────────────────────────────────
  deploy-hub:
    name: Deploy to Hub
    runs-on: ubuntu-latest
    needs: [build, integration-tests, opal-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: hub-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: opal-bridge-dist
          path: ${{ env.PACKAGE_PATH }}/dist

      - name: Deploy to regen-coordination-os
        run: |
          chmod +x ${{ env.PACKAGE_PATH }}/scripts/deploy-to-hub.sh
          ${{ env.PACKAGE_PATH }}/scripts/deploy-to-hub.sh
        env:
          HUB_SSH_KEY: ${{ secrets.HUB_SSH_KEY }}
          HUB_HOST: ${{ secrets.HUB_HOST }}
          HUB_USER: ${{ secrets.HUB_USER }}
          ENABLE_FEDERATION: 'true'

  # ─────────────────────────────────────────
  # Deploy to Nodes (refi-dao-os, refi-bcn-os)
  # ─────────────────────────────────────────
  deploy-nodes:
    name: Deploy to Nodes
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        node:
          - name: refi-dao-os
            ssh_key: NODE_DAO_SSH_KEY
            host: NODE_DAO_HOST
            user: NODE_DAO_USER
          - name: refi-bcn-os
            ssh_key: NODE_BCN_SSH_KEY
            host: NODE_BCN_HOST
            user: NODE_BCN_USER
    environment: node-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: opal-bridge-dist
          path: ${{ env.PACKAGE_PATH }}/dist

      - name: Deploy to ${{ matrix.node.name }}
        run: |
          chmod +x ${{ env.PACKAGE_PATH }}/scripts/deploy-to-node.sh
          ${{ env.PACKAGE_PATH }}/scripts/deploy-to-node.sh ${{ matrix.node.name }}
        env:
          NODE_SSH_KEY: ${{ secrets[matrix.node.ssh_key] }}
          NODE_HOST: ${{ secrets[matrix.node.host] }}
          NODE_USER: ${{ secrets[matrix.node.user] }}
          NODE_NAME: ${{ matrix.node.name }}

  # ─────────────────────────────────────────
  # Security Scan
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
