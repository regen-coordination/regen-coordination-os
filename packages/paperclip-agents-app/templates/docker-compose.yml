version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paperclip-postgres
    environment:
      POSTGRES_DB: paperclip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  paperclip:
    build: .
    container_name: paperclip-agents
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=paperclip
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGSSLMODE=disable
    ports:
      - "3100:3100"
    volumes:
      - ../:/app/org-os

volumes:
  postgres_data:
