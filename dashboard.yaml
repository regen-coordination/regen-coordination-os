# dashboard.yaml — Controls what /initialize shows
# Toggle sections on/off, reorder, and customize without deleting any files.
#
# Sections render in the order listed below.
# Set `show: false` to hide a section. Set `show: true` (or omit) to show it.
# Some sections accept extra options for fine-tuning.
#
# Tuned for the framework + orchestration hub role: instance health is the
# headline; treasury/meetings/apps sections hidden in solo-maintainer phase.

schema_version: "2.0"

# ─── Dashboard Sections ──────────────────────────────────────────────────────

sections:

  header:
    show: true
    style: ascii

  projects:
    show: true
    max: null
    stages: null

  tasks:
    show: true
    max: null
    show_completed: true

  calendar:
    show: false             # No formal meetings in solo phase

  funding:
    show: false             # No treasury in solo phase
    horizon_days: 30

  context:
    show: true
    max_entries: 3

  plans:
    show: true
    queued_preview: 3       # Bumped from 2 — framework has several queued plans

  apps:
    show: false             # No apps at framework level; instances turn on

  cheatsheet:
    show: true

  federation:
    show: true

  prompt:
    show: true
    suggestions: 3

# ─── Custom Sections ─────────────────────────────────────────────────────────
# Framework-specific sections — orchestration hub view.

custom_sections:
  - name: "Instances"
    show: true
    source: "data/instances.yaml"
    render: "table"
    description: "Downstream instances with maturity, framework version, last sync, and drift"
    columns: [id, name, type, maturity, framework_version, last_sync]

  - name: "Skill Promotion Candidates"
    show: true
    source: "data/skills-matrix.yaml"
    render: "list"
    description: "Skills validated in ≥1 instance but not yet canonical — see docs/SKILL-PROMOTION.md"
    filter:
      promotion_status: candidate

  - name: "Package Promotion Candidates"
    show: true
    source: "data/packages-matrix.yaml"
    render: "list"
    description: "Packages validated across instances, candidates for framework promotion"
    filter:
      promotion_status: candidate
