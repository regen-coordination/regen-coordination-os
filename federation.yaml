# Regen Coordination OS — Federation Manifest v3.0

version: "3.0"
spec: "organizational-os/3.0"

# ── Hub Identity ──────────────────────────────────────────────────────────────
identity:
  name: "Regen Coordination OS"
  type: "Hub"
  emoji: "🌐"
  daoURI: "https://regen-coordination.github.io/.well-known/dao.json"
  chain: "eip155:100"
  onchain_registration:
    enabled: false

# ── Network Structure ─────────────────────────────────────────────────────────
network: "regen-coordination"
hub: "github.com/regen-coordination/regen-coordination-os"

# Hub's upstream: organizational-os standards stack
upstream:
  - type: "template"
    repository: "regen-coordination/organizational-os"
    url: "https://github.com/regen-coordination/organizational-os"
    path: "packages/template"
    relationship: "fork"
    sync_frequency: "monthly"
    remote_name: "upstream"
  - type: "framework"
    repository: "regen-coordination/organizational-os-framework"
    url: "https://github.com/regen-coordination/organizational-os-framework"
    relationship: "managed-reference"
    sync_frequency: "monthly"
  - type: "template"
    repository: "regen-coordination/organizational-os-template"
    url: "https://github.com/regen-coordination/organizational-os-template"
    relationship: "managed-reference"
    sync_frequency: "monthly"

# Hub's downstream: all network nodes
downstream:
  - name: "ReFi BCN"
    repo: "regen-coordination/refi-bcn"
    url: "https://github.com/regen-coordination/refi-bcn"
    type: "implementation"
    trust: "full"

  - name: "NYC Node"
    repo: "regen-coordination/nyc-node"
    url: "https://github.com/regen-coordination/nyc-node"
    type: "implementation"
    trust: "full"

  - name: "Bloom"
    repo: "regen-coordination/bloom"
    url: "https://github.com/regen-coordination/bloom"
    type: "implementation"
    trust: "full"

  - name: "GreenPill Network"
    repo: "regen-coordination/greenpill"
    url: "https://github.com/regen-coordination/greenpill"
    type: "implementation"
    trust: "read"

  - name: "Regenerant Catalunya"
    repo: "regen-coordination/regenerant-catalunya"
    url: "https://github.com/regen-coordination/regenerant-catalunya"
    type: "program-node"
    trust: "full"

  - name: "Local ReFi Toolkit"
    repo: "regen-coordination/local-refi-toolkit"
    url: "https://github.com/regen-coordination/local-refi-toolkit"
    type: "resource-node"
    trust: "full"

  - name: "Coop"
    repo: "regen-coordination/coop"
    url: "https://github.com/regen-coordination/coop"
    type: "product-node"
    trust: "full"

# Hub has no peers (it is the hub)
peers: []

# ── Tool Integrations ────────────────────────────────────────────────────────
# Full specs: see integrations/README.md and integrations/profiles/
integrations:
  knowledge_infrastructure:
    - name: "koi-net"
      repo: "organizational-os/koi-net"
      url: "https://github.com/organizational-os/koi-net"
      role: "real-time-knowledge-sync"
  content:
    - name: "regen-toolkit"
      repo: "organizational-os/regen-toolkit"
      url: "https://github.com/organizational-os/regen-toolkit"
      role: "educational-content"
  agent_runtimes:
    - name: "openclaw"
      repo: "organizational-os/openclaw-source"
      url: "https://github.com/organizational-os/openclaw-source"
      role: "primary-runtime"
  tools:
    - name: "coop"
      repo: "regen-coordination/coop"
      url: "https://github.com/regen-coordination/coop"
      role: "browser-knowledge-commons"
      status: "active"

# ── Agent Configuration ────────────────────────────────────────────────────────
# Hub does not run an agent by default — it is a Git-based coordination point.
# Automation is via GitHub Actions.
agent:
  runtime: "none"
  skills:
    - meeting-processor
    - funding-scout
    - knowledge-curator
  proactive: false

# ── Knowledge Commons ─────────────────────────────────────────────────────────
knowledge-commons:
  enabled: true
  shared-domains:
    - "regenerative-finance"
    - "local-governance"
    - "knowledge-infrastructure"
    - "agroforestry"
    - "waste-management"
  sync-protocol: "git"
  publish:
    meetings: false      # Hub aggregates from nodes, doesn't publish its own
    projects: false
    funding: true        # Hub maintains network-wide funding opportunities
  subscribe:
    - domain: "regenerative-finance"
      from: "all"
    - domain: "local-governance"
      from: "all"
    - domain: "knowledge-infrastructure"
      from: "all"

# ── Packages ─────────────────────────────────────────────────────────────────
packages:
  knowledge_base: true
  meetings: false
  projects: false
  finances: false
  coordination: true
  webapps: false
  web3: false

# ── Governance ────────────────────────────────────────────────────────────────
governance:
  type: "multi-org-council"
  partners:
    - name: "ReFi DAO"
      role: "articulation-org"
      url: "https://refi.dao"
    - name: "Greenpill Network"
      role: "articulation-org"
      url: "https://greenpill.network"
    - name: "Bloom Network"
      role: "governing-partner"
    - name: "Bread Coop"
      role: "governing-partner-invited"
  maintainers:
    - name: "Regen Coordination Council"
      role: "owner"
  decision_model: "consensus"
  proposal_threshold: "Council consensus"
  voting_period: "1 week (async, weekly sync call)"

# ── Communication Channels ─────────────────────────────────────────────────────
channels:
  forum:
    name: "Regen Coordination Hub"
    url: "https://hub.regencoordination.xyz"
    api: "https://hub.regencoordination.xyz/latest.json"
    categories:
      - id: 4
        slug: "regen-coordination"
      - id: 20
        slug: "greenpill"
      - id: 21
        slug: "refi-dao"
      - id: 33
        slug: "regen-commons"
  telegram:
    - name: "RC Council"
      type: "private"
      purpose: "governance"
    - name: "RC Open"
      type: "public"
      purpose: "community"

# ── Platforms ─────────────────────────────────────────────────────────────────
platforms:
  primary: "github"
  deployment: "github-pages"
  domain: ""

# ── Metadata ─────────────────────────────────────────────────────────────────
metadata:
  created: "2026-02-20T00:00:00Z"
  last_updated: "2026-03-06T00:00:00Z"
  framework_version: "3.0"
