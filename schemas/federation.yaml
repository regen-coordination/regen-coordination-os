# Federation Manifest v3.0 Specification
# Extends v2.0 with agent configuration, skill declarations, and knowledge commons
# Compatible with OpenClaw / AgentSkills runtime convention

version: "3.0"
spec: "organizational-os/3.0"
description: "Repository relationship manifest for agent-native federated organizational workspaces"

# CHANGELOG from v2.0:
# - Added identity.emoji, identity.chain, identity.safe, identity.hats, identity.gardens
# - Added federation.network, federation.hub, federation.peers (replaces simple upstream/downstream)
# - Added agent section (runtime, skills, channels, proactive, heartbeat_interval)
# - Added knowledge-commons section
# - Version bump: "2.0" → "3.0", spec: "organizational-os/2.0" → "organizational-os/3.0"

# ── Organizational Identity (EIP-4824) ──────────────────────────────────────
identity:
  # NEW in v3.0
  name:
    type: string
    description: "Organization or node name"
    required: true

  type:
    type: string
    enum: ["DAO", "Cooperative", "Foundation", "Project", "LocalNode", "RegionalNode", "Hub", "Network", "Other"]
    description: "Organization/node type"
    required: true

  emoji:
    type: string
    description: "Visual identifier emoji"
    required: false

  chain:
    type: string
    description: "Primary blockchain (CAIP-2 format, e.g., 'eip155:100' for Gnosis Chain)"
    required: false

  safe:
    type: string
    description: "Primary Gnosis Safe address"
    format: address
    required: false

  hats:
    type: integer
    description: "Hats Protocol tree ID"
    required: false

  gardens:
    type: string
    description: "Gardens DAO contract address"
    format: address
    required: false

  daoURI:
    type: string
    description: "URI to the organization's daoURI JSON-LD document"
    example: "https://org.example.com/.well-known/dao.json"
    required: true
  
  type:
    type: string
    enum: ["Organization", "DAO", "Cooperative", "Project", "Foundation", "Other"]
    description: "Type of organization"
    default: "Organization"
    required: true
  
  name:
    type: string
    description: "Organization name"
    required: true
  
  onchain_registration:
    enabled:
      type: boolean
      description: "Whether organization is registered on-chain"
      default: false
    
    chain:
      type: string
      description: "Blockchain network (e.g., 'eip155:1' for Ethereum mainnet)"
      required: false
    
    contract_address:
      type: string
      description: "EIP-4824 registration contract address"
      format: address
      required: false

# ── Network Membership (NEW in v3.0) ─────────────────────────────────────────
network:
  type: string
  description: "Federation network identifier (e.g., 'regen-coordination')"
  required: false

hub:
  type: string
  description: "Hub repository path (e.g., 'github.com/regen-coordination/hub')"
  required: false

peers:
  type: array
  description: "Sibling nodes in the same network"
  items:
    type: object
    properties:
      name:
        type: string
        description: "Peer display name"
      repo:
        type: string
        description: "Repository path (org/repo)"
      url:
        type: string
        format: uri
        description: "Full repository URL"
      trust:
        type: string
        enum: ["full", "read", "none"]
        description: "Trust level for this peer"
        default: "read"

# ── Upstream/Downstream Relationships ────────────────────────────────────────
upstream:
  type: array
  description: "Repositories this repository depends on (templates, bases)"
  items:
    type: object
    properties:
      type:
        type: string
        enum: ["template", "base", "dependency"]
        description: "Type of upstream relationship"
      
      repository:
        type: string
        description: "Repository identifier (org/repo)"
        example: "organizational-os/organizational-os-template"
      
      url:
        type: string
        format: uri
        description: "Repository URL"
        example: "https://github.com/organizational-os/organizational-os-template"
      
      version:
        type: string
        description: "Version or tag being tracked"
        example: "v1.0.0"
      
      relationship:
        type: string
        enum: ["fork", "template", "dependency"]
        description: "Nature of relationship"
      
      last_sync:
        type: string
        format: date
        description: "Last sync date in ISO-8601 format"
      
      sync_frequency:
        type: string
        enum: ["manual", "weekly", "monthly", "quarterly"]
        description: "Sync frequency"
        default: "manual"
      
      remote_name:
        type: string
        description: "Git remote name (typically 'upstream')"
        default: "upstream"

downstream:
  type: array
  description: "Repositories that depend on this one"
  items:
    type: object
    properties:
      repository:
        type: string
        description: "Repository identifier"
      
      url:
        type: string
        format: uri
        description: "Repository URL"
      
      type:
        type: string
        enum: ["fork", "implementation"]
      
      relationship:
        type: string
        description: "Nature of relationship"
      
      last_sync_check:
        type: string
        format: date
        description: "Last time sync was checked"

# ── Agent Configuration (NEW in v3.0) ────────────────────────────────────────
agent:
  type: object
  description: "AI agent configuration for this workspace"
  properties:
    runtime:
      type: string
      enum: ["openclaw", "cursor", "custom", "none"]
      description: "Agent runtime platform"
      default: "none"

    workspace:
      type: string
      description: "Path to workspace root"
      default: "."

    skills:
      type: array
      description: "Skills enabled for this node's agent"
      items:
        type: string
        description: "Skill name matching a directory in skills/"
      example: ["meeting-processor", "funding-scout", "knowledge-curator"]

    channels:
      type: array
      description: "Communication channels the agent listens on"
      items:
        type: string
        enum: ["telegram", "google-meet", "github", "discord", "signal", "slack", "matrix", "imessage", "whatsapp", "custom"]

    proactive:
      type: boolean
      description: "Whether agent runs proactive heartbeat/scheduled tasks"
      default: false

    heartbeat_interval:
      type: string
      description: "Proactive check interval (e.g., '30m', '1h', or cron expression)"
      default: "1h"

# ── Knowledge Commons (NEW in v3.0) ──────────────────────────────────────────
knowledge-commons:
  type: object
  description: "Federated knowledge sharing configuration"
  properties:
    enabled:
      type: boolean
      default: false

    shared-domains:
      type: array
      description: "Domains this node contributes knowledge about"
      items:
        type: string
      example: ["regenerative-finance", "agroforestry", "local-governance"]

    sync-protocol:
      type: string
      enum: ["git", "koi-net", "manual"]
      description: "Knowledge sync protocol"
      default: "git"

    publish:
      type: object
      description: "What this node publishes to the commons"
      properties:
        meetings:
          type: boolean
          description: "Meeting summaries (not transcripts)"
          default: false
        projects:
          type: boolean
          description: "Project status updates"
          default: false
        funding:
          type: boolean
          description: "Funding opportunities discovered"
          default: false

    subscribe:
      type: array
      description: "What this node receives from the commons"
      items:
        type: object
        properties:
          domain:
            type: string
          from:
            type: string
            description: "Source: 'all', 'hub', or specific node ID"
            default: "all"

# ── Operational Packages Enabled ──────────────────────────────────────────────
packages:
  type: object
  description: "Which operational packages are enabled"
  properties:
    knowledge_base:
      type: boolean
      description: "Quartz-based knowledge base"
      default: true
    
    meetings:
      type: boolean
      description: "Meeting management package"
      default: false
    
    projects:
      type: boolean
      description: "Project tracking package (IDEA framework)"
      default: false
    
    finances:
      type: boolean
      description: "Financial management package"
      default: false
    
    coordination:
      type: boolean
      description: "Multi-organization coordination package"
      default: false
    
    webapps:
      type: boolean
      description: "Interactive webapps package"
      default: false
    
    web3:
      type: boolean
      description: "Web3 features (on-chain registration, token-gating)"
      default: false

# Customizations
customizations:
  type: array
  description: "Customizations made to template/base"
  items:
    type: object
    properties:
      path:
        type: string
        description: "File or directory path"
      
      reason:
        type: string
        description: "Reason for customization"
      
      type:
        type: string
        enum: ["override", "addition", "replacement"]
        description: "Type of customization"
      
      maintain_on_sync:
        type: boolean
        description: "Whether to maintain customization during upstream sync"
        default: true

# Governance
governance:
  type: object
  description: "Governance information"
  properties:
    maintainers:
      type: array
      description: "List of maintainers"
      items:
        type: object
        properties:
          name:
            type: string
            description: "Maintainer name or identifier"
          
          role:
            type: string
            enum: ["owner", "maintainer", "contributor"]
            description: "Maintainer role"
    
    decision_model:
      type: string
      enum: ["consensus", "voting", "hierarchical", "delegated", "other"]
      description: "Decision-making model"
    
    proposal_threshold:
      type: string
      description: "Threshold for proposals (e.g., 'majority vote', 'consensus')"
    
    voting_period:
      type: string
      description: "Voting period duration (e.g., '7 days')"

# Platform Information
platforms:
  type: object
  description: "Platform and deployment information"
  properties:
    primary:
      type: string
      enum: ["github", "gitlab", "radicle", "other"]
      description: "Primary platform"
      default: "github"
    
    deployment:
      type: string
      enum: ["github-pages", "railway", "vercel", "self-hosted", "other"]
      description: "Deployment platform"
      default: "github-pages"
    
    domain:
      type: string
      description: "Custom domain (if applicable)"
    
    mirrors:
      type: array
      description: "Mirror repositories on other platforms"
      items:
        type: string
        format: uri

# Metadata
metadata:
  type: object
  description: "Metadata about this manifest"
  properties:
    created:
      type: string
      format: date-time
      description: "Creation date in ISO-8601 format"
      required: true
    
    last_updated:
      type: string
      format: date-time
      description: "Last update date in ISO-8601 format"
      required: true
    
    framework_version:
      type: string
      description: "Framework version used"
      example: "2.0"
      required: true

# Example Manifest (v3.0 — ReFi BCN local node)
example: |
  version: "3.0"
  spec: "organizational-os/3.0"

  identity:
    name: "ReFi BCN"
    type: "LocalNode"
    emoji: "🌱"
    daoURI: "https://refi-bcn.github.io/.well-known/dao.json"
    chain: "eip155:100"
    safe: "0xABCD1234..."
    hats: 12345
    onchain_registration:
      enabled: true
      chain: "eip155:100"

  network: "regen-coordination"
  hub: "github.com/regen-coordination/hub"

  peers:
    - name: "NYC Node"
      repo: "regen-coordination/nyc-node"
      url: "https://github.com/regen-coordination/nyc-node"
      trust: "read"
    - name: "Bloom Node"
      repo: "regen-coordination/bloom-node"
      url: "https://github.com/regen-coordination/bloom-node"
      trust: "read"

  upstream:
    - type: "template"
      repository: "organizational-os/organizational-os-template"
      url: "https://github.com/organizational-os/organizational-os-template"
      relationship: "fork"
      last_sync: "2026-02-20"
      sync_frequency: "monthly"
      remote_name: "upstream"

  downstream: []

  agent:
    runtime: "openclaw"
    skills:
      - meeting-processor
      - funding-scout
      - knowledge-curator
      - capital-flow
      - schema-generator
    channels:
      - telegram
      - google-meet
      - github
    proactive: true
    heartbeat_interval: "30m"

  packages:
    knowledge_base: true
    meetings: true
    projects: true
    finances: true
    coordination: true
    webapps: true
    web3: true

  knowledge-commons:
    enabled: true
    shared-domains:
      - "regenerative-finance"
      - "local-governance"
    sync-protocol: "git"
    publish:
      meetings: true
      projects: true
      funding: true
    subscribe:
      - domain: "regenerative-finance"
        from: "all"

  customizations:
    - path: "content/"
      reason: "Organization-specific content"
      type: "addition"
      maintain_on_sync: true
    - path: "data/"
      reason: "Operational data"
      type: "addition"
      maintain_on_sync: true

  governance:
    maintainers:
      - name: "ReFi BCN Team"
        role: "owner"
    decision_model: "consensus"
    proposal_threshold: "Consensus required"

  platforms:
    primary: "github"
    deployment: "github-pages"
    domain: "refi.barcelona"

  metadata:
    created: "2026-02-20T00:00:00Z"
    last_updated: "2026-02-20T00:00:00Z"
    framework_version: "3.0"
