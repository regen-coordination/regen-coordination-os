# Funding Platforms Reference
# Used by funding-scout skill
# Update as new platforms are discovered or status changes

platforms:
  artisan:
    name: "Artisan"
    url: "https://artisan.com"
    type: "quadratic-matching"
    cadence: "seasonal"
    season_duration: "2-4 months"
    mechanics:
      votes: "Signaling importance to fund managers (reset each season)"
      artifacts: "Actual fundraising mechanism (donations + matching unlock)"
      fund_manager_restriction: "Cannot vote for own projects"
      donation_options: ["web3 wallet", "card"]
    notes: "Growing platform. $11M+ total distributed. Transaction fees ~$5 on $20 donation loop through rev-net."
    contact: "Renee (platform founder)"

  octant:
    name: "Octant"
    url: "https://octant.app"
    type: "yield-distribution"
    cadence: "quarterly"
    mechanics:
      source: "ETH staking yield (minus Lido cut ~2-3%)"
      model: "Project allocation from staking yield"
      vault_strategies: "Multi-strategy vaults (plug-and-play roadmap)"
    notes: "Relationship-driven. James (Octant) is key contact. New: Octant Labs."
    contact: "James (Octant), Eugene"

  impact-stake:
    name: "Impact Stake"
    url: "https://impactstake.org"
    type: "eth-yield-staking"
    cadence: "ongoing"
    mechanics:
      model: "1/3-1/3-1/3 split approach"
      yield_rate: "~2-3% ETH staking yield"
      governance: "StreamVote integration potential"
    notes: "Needs co-funders for credible proposals. StreamVote = trust-graph voting."

  superfluid:
    name: "Superfluid Campaigns"
    url: "https://superfluid.finance"
    type: "streaming-rewards"
    cadence: "monthly-seasons"
    mechanics:
      token: "SUB token"
      model: "Flow-based — sooner you start, sooner flow begins and continues"
      seasons: "Season-based; some campaigns carry over, some don't"
    notes: "Season 5 ending → Season 6 details TBD. Check which campaigns carry over."

  gitcoin:
    name: "Gitcoin"
    url: "https://gitcoin.co"
    type: "quadratic-funding"
    cadence: "seasonal"
    notes: "Large web3 audience. Multiple rounds per year."

  spinach:
    name: "Spinach"
    url: "https://spinach.app"
    type: "automatic-distribution"
    cadence: "monthly-renewal"
    mechanics:
      model: "Monthly renewal; connected to Gardens/projects"
      campaigns: "UberSwap campaign: 10% APY USDC + OOBA token rewards"
    notes: "Completely passive. RefiDAO earning ~$50/month. Check monthly renewal."

  celo-pg:
    name: "Celo PG"
    url: "https://celoPG.org"
    type: "ecosystem-grants"
    cadence: "per-round"
    notes: "350k public goods allocated 2025 H1. CeloPG activity low post-funding. Marek (Celo Labs) is key contact."
    contact: "Marek (Celo Labs)"

  arbitrum:
    name: "Arbitrum Grants"
    url: "https://arbitrum.foundation/grants"
    type: "ecosystem-grants"
    cadence: "per-cycle"
    notes: "Tech/dev focus. Check DAC framework alignment."

  stream-vote:
    name: "StreamVote"
    url: "https://streamvote.app"
    type: "governance-tool"
    cadence: "ongoing"
    notes: "Not direct funding — governance layer. Trust-graph based voting weights. Fork of existing governance suite. Relevant for domain pool governance design."
